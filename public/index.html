<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>课程标准演变｜历代学科星图</title>
  <meta name="description" content="在一张可核查的课程宇宙中观察20世纪以来各学科关键概念在课程标准中的历次出现与变化。">
  <meta name="theme-color" content="#050814">
  <link rel="canonical" href="https://curriculum.bdfz.net/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="课程标准演变｜历代学科星图">
  <meta property="og:description" content="按年代、学科与概念关系探索中国课程标准及考试评价的历史变迁。">
  <meta property="og:url" content="https://curriculum.bdfz.net/">
  <meta property="og:image" content="https://img.bdfz.net/20250503004.webp">
  <link rel="icon" href="https://img.bdfz.net/20250503004.webp" type="image/webp">
  <link rel="apple-touch-icon" href="https://img.bdfz.net/20250503004.webp">
  <link rel="stylesheet" href="/styles.css?v=20260723v23">
  <link rel="modulepreload" href="/subject-facets.js?v=20260723v23">
  <script type="module" src="/app.js?v=20260723v23"></script>
</head>
<body>
  <a class="skip-link" href="#cosmos-stage">跳到课程星图</a>
  <header class="site-header">
    <a class="brand" href="/" data-link aria-label="返回课程标准演变星图">
      <span class="brand-seal" aria-hidden="true">纬</span>
      <span><b>课程标准演变</b><small>20世纪—今天</small></span>
    </a>
  </header>

  <main id="app">
    <section class="cosmos-stage" id="cosmos-stage" aria-label="中国历代课程标准关键概念演进星图">
      <div class="cosmos-loading" id="cosmos-loading"><span></span><p>正在生成概念演进星图</p></div>
      <div class="cosmos-mount" id="cosmos-mount"></div>

      <aside class="map-control-column" aria-label="学科与谱系工具">
        <section class="subject-cluster" aria-label="学科显隐">
          <header class="control-section-title">
            <b id="subject-mode-label">全学科星图</b>
            <span id="subject-status">12/12 · 全部显示</span>
            <button id="show-all-subjects" type="button">全开</button>
          </header>
          <div class="subject-orbit" id="subject-orbit"></div>
        </section>
        <section class="era-cluster" aria-label="年代筛选">
          <header class="control-section-title"><b>百年纵轴</b><span>1902—2022</span></header>
          <div class="era-rail">
            <div class="era-buttons" id="era-buttons"></div>
            <div class="year-scrubber">
              <span id="year-start">1902</span>
              <label class="sr-only" for="year-range">显示至年份</label>
              <input id="year-range" type="range" min="1902" max="2022" value="2022" step="1">
              <strong id="year-value">2022</strong>
            </div>
          </div>
        </section>
        <form class="search-orbit" id="cosmos-search" role="search">
          <label class="sr-only" for="cosmos-query">在星图中搜索概念、术语与能力</label>
          <span aria-hidden="true">⌕</span>
          <input id="cosmos-query" name="query" type="search" autocomplete="off" placeholder="检索概念、术语、能力">
          <button type="button" id="clear-query" aria-label="清除搜索" hidden>×</button>
        </form>
        <div class="mode-switch" aria-label="星图关系模式">
          <button class="active" type="button" data-map-mode="lineage">百年演进</button>
          <button type="button" data-map-mode="cross">概念关系</button>
          <button type="button" data-map-mode="structure">概念深挖</button>
        </div>
        <nav class="research-dock" aria-label="资料与研究工作台">
          <a href="/compare" data-link data-workspace="library"><b>版本 · 资料</b><small>比较、全文与百年证据</small></a>
          <a href="/ai" data-link data-workspace="research"><b>研究 · 讨论</b><small>证据 AI 与教师讨论</small></a>
        </nav>
        <a class="ocr-layer-status" id="ocr-layer-status" href="/archive" data-link hidden></a>
        <div class="map-key" id="map-key">
          <span><i class="key-evolution"></i>点选概念：照亮整条百年演进链</span>
        </div>
      </aside>
      <section class="concept-layers" id="concept-layers" aria-label="学科概念层级星图" hidden></section>

      <aside class="star-inspector" id="star-inspector" aria-live="polite" aria-label="概念演进详情" hidden></aside>
      <div class="atlas-tooltip" id="atlas-tooltip" hidden></div>

    </section>

    <section class="workbench" id="workbench" aria-live="polite" hidden>
      <div class="workbench-handle" aria-hidden="true"></div>
      <header class="workbench-header">
        <div>
          <p id="workbench-kicker">研究明细</p>
          <h1 id="workbench-title">版本与资料</h1>
        </div>
        <button class="workbench-close" id="workbench-close" type="button" aria-label="关闭工作台">×</button>
      </header>
      <nav class="workbench-tabs" id="workbench-tabs" aria-label="工作台栏目"></nav>
      <div class="workbench-body" id="workbench-body"></div>
    </section>
  </main>

  <div class="scrim" id="scrim" hidden></div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
</body>
</html>
